    function handleDownloadTxt(pdfData) {
      if (!pdfData) {
        showToast("❌ 找不到說明書資訊！");
        return;
      }
      showToast("💾 正在準備官方產品成分與說明書文字檔 (.txt)...");
      
      const textContent = `========================================
   CELUNE BEAUTY - 官方產品成分與說明書
========================================
【產品名稱】：${pdfData.productName}
【官方品牌】：${pdfData.brand}
【產品產地】：${pdfData.origin}
【產品容量】：${pdfData.capacity}
【適用膚質】：${pdfData.skinType || '所有膚質適用'}
【主要成分】：${pdfData.ingredients}
【產品亮點】：${pdfData.highlights}

本文件為官方認證產品成分說明書，如需專人諮詢請攜帶此文件至現場門市。`;

      const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      
      const txtFileName = (pdfData.name || 'CELUNE_Report.pdf').replace('.pdf', '') + '_說明書.txt';
      link.download = txtFileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      
      showToast("✅ 產品說明書文字檔 (.txt) 下載成功！");
    }

    function handlePrintContent(elementId) {
      const element = document.getElementById(elementId);
      if (!element) {
        showToast("❌ 找不到列印內容。");
        return;
      }
      
      showToast("🖨️ 正在啟動安全列印沙盒...");

      const iframe = document.createElement('iframe');
      iframe.style.position = 'fixed';
      iframe.style.right = '0';
      iframe.style.bottom = '0';
      iframe.style.width = '0';
      iframe.style.height = '0';
      iframe.style.border = '0';
      document.body.appendChild(iframe);
      
      const doc = iframe.contentWindow.document;
      doc.open();
      doc.write(`
        <html>
          <head>
            <title>CELUNE Invoice Print Sandbox</title>
            <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
            <style>
              body { 
                background: white !important; 
                color: #1e293b !important; 
                font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important; 
                padding: 30px !important; 
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
              }
              @page { 
                size: A4; 
                margin: 15mm; 
              }
              button, .print\\:hidden {
                display: none !important;
              }
            </style>
          </head>
          <body>
            <div class="w-full">${element.innerHTML}</div>
            <script>
              window.onload = function() {
                window.focus();
                setTimeout(function() {
                  window.print();
                  setTimeout(function() {
                    window.parent.document.body.removeChild(window.frameElement);
                  }, 500);
                }, 300);
              };
            <\/script>
          </body>
        </html>
      `);
      doc.close();
    }

        const matchSkin = state.selectedSkinType === 'All' || p.skinType.includes(state.selectedSkinType) || p.skinType.includes('所有膚質');

                            p.ingredients.toLowerCase().includes(state.searchQuery.toLowerCase());
        return matchBrand && matchCategory && matchSkin && matchSearch;
      });
    }

    window.addToCart = function(prodId) {
      const product = state.products.find(p => p.id === prodId);
      if (!product) return;
      
      const existing = state.cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        state.cart.push({ ...product, quantity: 1 });
      }
      showToast(`🛒 已將「${product.name.substring(0, 10)}...」放入預訂購物車`);
      saveState();
      render();
    }

    window.updateQuantity = function(id, amount) {
      const item = state.cart.find(i => i.id === id);
      if (item) {
        item.quantity += amount;
        if (item.quantity <= 0) {
          state.cart = state.cart.filter(i => i.id !== id);
        }
      }
      saveState();
      render();
    }

    window.removeFromCart = function(id) {
      state.cart = state.cart.filter(i => i.id !== id);

                ${state.authMode === 'login' ? `
                  <div class="space-y-2">
                    <p class="text-[11px] font-bold text-stone-400 uppercase tracking-wider mb-1">
                      ⚡ 快速模擬與測試入口
                    </p>
                    <div class="grid grid-cols-2 gap-2">
                      <button 
                        type="button"
                        onClick="handleQuickAdminLogin()"
                        class="flex items-center justify-center gap-1.5 bg-amber-50 hover:bg-amber-100 text-amber-950 font-bold py-2.5 px-3 rounded-xl text-xs border border-amber-200 transition"
                      >
                        <i data-lucide="settings" class="w-3.5 h-3.5 text-amber-700"></i>
                        <span>管理員 Janis</span>
                      </button>
                      <button 
                        type="button"
                        onClick="handleQuickUserLogin()"
                        class="flex items-center justify-center gap-1.5 bg-pink-50 hover:bg-pink-100/70 text-pink-950 font-bold py-2.5 px-3 rounded-xl text-xs border border-pink-200 transition"
                      >
                        <i data-lucide="user" class="w-3.5 h-3.5 text-pink-600"></i>
                        <span>會員 林志玲</span>
                      </button>
                    </div>
                    <div class="relative flex py-2 items-center">
                      <div class="flex-grow border-t border-stone-100"></div>
                      <span class="flex-shrink mx-3 text-stone-300 text-[10px] uppercase font-bold tracking-wider">或手動輸入</span>
                      <div class="flex-grow border-t border-stone-100"></div>
                    </div>
                  </div>
                ` : ''}

                <form onSubmit="handleAuthSubmit(event)" class="space-y-4">
                  ${state.authMode === 'register' ? `
                    <div>
                      <label class="block text-xs font-semibold text-stone-500 mb-1">顧客姓名 <span class="text-rose-500">*</span></label>
                      <input 
                        type="text" required placeholder="範例：王小美" value="${state.authForm.name}"
                        onInput="handleAuthFormInput('name', this.value)"
                        class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-pink-500 focus:bg-white text-sm"
                      />
                    </div>
                  ` : ''}

                  <div>
                    <label class="block text-xs font-semibold text-stone-500 mb-1">電子信箱 <span class="text-rose-500">*</span></label>
                    <input 
                      type="email" required placeholder="例如：chiling@example.com" value="${state.authForm.email}"
                      onInput="handleAuthFormInput('email', this.value)"
                      class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-pink-500 focus:bg-white text-sm"
                    />
                  </div>

                  ${state.authMode === 'register' ? `
                    <div>
                      <label class="block text-xs font-semibold text-stone-500 mb-1">聯絡電話 <span class="text-rose-500">*</span></label>
                      <input 
                        type="tel" required placeholder="0912-345-678" value="${state.authForm.phone}"
                        onInput="handleAuthFormInput('phone', this.value)"
                        class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-pink-500 focus:bg-white text-sm"
                      />
                    </div>
                  ` : ''}

                  <div>
                    <label class="block text-xs font-semibold text-stone-500 mb-1">密碼設定 (可留空)</label>
                    <input 
                      type="password" placeholder="請輸入登入密碼" value="${state.authForm.password}"
                      onInput="handleAuthFormInput('password', this.value)"
                      class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-pink-500 focus:bg-white text-sm"
                    />
                  </div>

                  <div class="bg-pink-50/30 p-3 rounded-xl text-stone-600 text-xs leading-normal border border-pink-100/20">
                    ${state.authMode === 'register' ? `
                      <span>✨ <strong>安全說明</strong>：註冊成功後系統將直接開通，並同步登入。</span>
                    ` : `
                      <span>💡 <strong>管理員提示</strong>：輸入 \`janis9631@gmail.com\` 將同步開啟金色頂端後台。</span>
                    `}
                  </div>

                  <div class="pt-2 flex justify-between gap-3">
                    <button 
                      type="button" 
                      onClick="closeAuthModal()"
                      class="bg-stone-100 hover:bg-stone-200 text-stone-600 font-bold text-xs px-4 py-2.5 rounded-xl transition"
                    >
                      取消
                    </button>
                    <button 
                      type="submit"
                      class="flex-1 bg-pink-600 hover:bg-pink-700 text-white font-bold p-2.5 rounded-xl text-xs transition shadow-sm"
                    >
                      ${state.authMode === 'register' ? '註冊並一秒開通' : '登入 CELUNE 帳戶'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        `;
      }

      // 9. 全域 Toast 提醒元件
      if (state.toastMessage) {
        html += `
          <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[200] bg-stone-900/90 backdrop-blur-md text-stone-100 px-6 py-3.5 rounded-full text-xs font-semibold tracking-wide shadow-xl flex items-center gap-2 animate-bounce print:hidden">
            <div class="w-4.5 h-4.5 bg-pink-600 rounded-full flex items-center justify-center">
              <i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>
            </div>
            <span>${state.toastMessage}</span>
          </div>
        `;
      }

      // 渲染至主畫板
      appEl.innerHTML = html;
      
      // 動態更新 Lucide 圖示
      lucide.createIcons();
    }

    // ==========================================
    // 8. 首次啟動與初始化
    // ==========================================
    window.onload = function() {
      render();
    };
  </script>
</body>
</html>
